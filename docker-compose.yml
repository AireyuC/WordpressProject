services:
  db:
    image: mysql:8.0
    container_name: wp_db
    restart: unless-stopped
    env_file: .env # Toma las variables de nuestro archivo .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: wp_app
    restart: unless-stopped
    ports:
      - "80:80" # Expone el puerto 80 del contenedor al puerto 80 del VPS
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: db:3306 # El nombre del servicio de la BD arriba
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      - wp_data:/var/www/html

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_app
    restart: unless-stopped
    ports:
      - "5678:5678" # Puerto por defecto de n8n
    environment:
      - N8N_HOST=${VPS_IP:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://${VPS_IP:-localhost}:5678/
      - GENERIC_TIMEZONE=America/La_Paz # Zona horaria (Bolivia)
      - N8N_SECURE_COOKIE=false # Permite usar n8n sin certificados SSL
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  db_data: # Persistencia para MySQL
  wp_data: # Persistencia para WordPress
  n8n_data: # Persistencia de flujos y cuentas de n8n
